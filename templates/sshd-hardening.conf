# Drop-in SSH hardening — installé par le script d'install VPS
# Géré sur le port 2222 via ssh.socket override.

Port 2222

# Auth : clés uniquement
PermitRootLogin no
PasswordAuthentication no
KbdInteractiveAuthentication no
ChallengeResponseAuthentication no
UsePAM yes
PubkeyAuthentication yes
PermitEmptyPasswords no

# Limitation des comptes
AllowUsers ubuntu
MaxAuthTries 3
MaxSessions 5
LoginGraceTime 30

# Forwarding désactivé
X11Forwarding no
AllowAgentForwarding no
AllowTcpForwarding yes
GatewayPorts no
PermitTunnel no

# Banner & idle
Banner none
PrintMotd no
ClientAliveInterval 300
ClientAliveCountMax 2

# Algorithmes modernes uniquement
KexAlgorithms curve25519-sha256,curve25519-sha256@libssh.org,sntrup761x25519-sha512@openssh.com
Ciphers chacha20-poly1305@openssh.com,aes256-gcm@openssh.com,aes128-gcm@openssh.com
MACs hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com
HostKeyAlgorithms ssh-ed25519,rsa-sha2-512,rsa-sha2-256
PubkeyAcceptedAlgorithms ssh-ed25519,rsa-sha2-512,rsa-sha2-256

# Logs verbeux pour CrowdSec
LogLevel VERBOSE
